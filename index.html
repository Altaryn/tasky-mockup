// Delegación de clics
document.addEventListener('click', e=>{
  const el=e.target.closest('[data-action]');
  if(!el) return;
  const a=el.dataset.action;
  const id=el.dataset.id;

  switch(a){
    case 'nav': setNav(el.dataset.nav); closeDrawer(); break;
    case 'view': state.view=el.dataset.view; renderView(); renderHeader(); break;
    case 'new-task': openNewTask({date:el.dataset.date||null, noDate:el.dataset.nodate==='1'}); break;
    case 'filters': openFilters(el); break;
    case 'toggle': toggleComplete(id); break;
    case 'edit': openEditTask(id); break;
    case 'task-menu': openTaskMenu(el, id); break;
    case 'card-menu': openCardMenu(el, id); break;
    case 'menu-open': openDrawer(); break;
    case 'menu-close': closeDrawer(); break;
    case 'show-shortcuts': showShortcuts(); closeDrawer(); break;
    case 'reset-demo': resetDemo(); break;
    case 'toggle-theme': toggleTheme(); break;

    // Calendario
    case 'cal-prev': calNav(-1); break;
    case 'cal-next': calNav(1); break;
    case 'cal-today': state.calRef=toISO(today()); renderView(); break;
    case 'cal-view': state.calView=el.dataset.calview; renderView(); break;
    case 'cal-goto': state.calView='day'; state.calRef=el.dataset.date; renderView(); break;
    case 'cal-day':
      // Click en zona vacía del día → nueva tarea con esa fecha
      if(e.target.closest('.cal-task')) break;
      openNewTask({date:el.dataset.date}); break;

    // Modal
    case 'backdrop': if(e.target.classList.contains('backdrop')) closeModal(); break;
    case 'modal-close': case 'modal-cancel': closeModal(); break;
    case 'modal-save': saveModal(); break;
    case 'modal-delete': deleteFromModal(); break;
    case 'attr': toggleAttr(el.dataset.attr, e); break;
    case 'attr-clear': clearAttr(el.dataset.attr); e.stopPropagation(); break;
    case 'set-date': setDraftDate(el.dataset.date); break;
    case 'set-prio': setDraftPrio(parseInt(el.dataset.prio,10)); break;
    case 'set-recur': break; // gestionado por change
    case 'add-label': addLabel(el.dataset.label); break;
    case 'del-label': delLabel(el.dataset.label); break;
    case 'focus-label': { const li=$('#labelInput'); if(li) li.focus(); break; }
    case 'add-reminder': addReminder(); break;
    case 'del-reminder': delReminder(parseInt(el.dataset.i,10)); break;
    case 'clear-deadline': state.modal.draft.deadline=null; renderDynamic(); break;
    case 'pick-file': $('#fileInput').click(); break;
    case 'del-file': state.modal.draft.attachment=null; renderDynamic(); break;
  }
});

// Cambios (selects, inputs date/time del modal)
document.addEventListener('change', e=>{
  const el=e.target.closest('[data-action]'); if(!el) return;
  const d=state.modal && state.modal.draft;
  switch(el.dataset.action){
    case 'date-exact': if(d){ d.date=el.value||null; renderDynamic(); } break;
    case 'time-exact': if(d){ d.time=el.value||null; renderDynamic(); } break;
    case 'set-recur': if(d){ d.recurrence=el.value; renderDynamic(); } break;
    case 'set-recur-int': if(d){ d.recurrenceInterval=Math.max(1,parseInt(el.value,10)||2); } break;
    case 'set-deadline': if(d){ d.deadline=el.value||null; renderDynamic(); } break;
  }
  // Cambio de tipo de recordatorio: alterna el input mostrado
  if(el.id==='remType'){
    const wrap=$('#remValueWrap');
    if(el.value==='before') wrap.innerHTML='<input class="inp" type="number" min="1" max="72" id="remHours" value="2" placeholder="Horas">';
    else wrap.innerHTML='<input class="inp" type="datetime-local" id="remAt">';
  }
});

// Inputs de texto que no re-renderizan (ubicación)
document.addEventListener('input', e=>{
  const el=e.target;
  if(!state.modal) return;
  const d=state.modal.draft;
  if(el.id==='locInput'){ d.location=el.value; }
});

// Etiquetas: Enter/coma para añadir
document.addEventListener('keydown', e=>{
  if(e.target && e.target.id==='labelInput'){
    if(e.key==='Enter' || e.key===','){
      e.preventDefault();
      const v=e.target.value.trim().replace(/^#/,'').toLowerCase();
      if(v){ addLabel(v); }
    }else if(e.key==='Backspace' && !e.target.value && state.modal.draft.labels.length){
      state.modal.draft.labels.pop(); renderDynamic();
    }
  }
});

// Adjunto: al elegir archivo
$('#fileInput').addEventListener('change', e=>{
  const f=e.target.files && e.target.files[0];
  if(f && state.modal){
    const kb=f.size<1024?f.size+' B':(f.size<1048576?Math.round(f.size/1024)+' KB':(f.size/1048576).toFixed(1)+' MB');
    state.modal.draft.attachment={name:f.name, size:kb};
    renderDynamic();
  }
  e.target.value='';
});

// Búsqueda
$('#searchInput').addEventListener('input', e=>{ state.search=e.target.value; renderView(); renderHeader(); });

// Cierra popovers al hacer clic fuera
document.addEventListener('mousedown', e=>{
  const r=$('#popRoot');
  if(r.classList.contains('open') && !e.target.closest('.pop') && !e.target.closest('[data-action="filters"]') && !e.target.closest('[data-action="task-menu"]') && !e.target.closest('[data-action="card-menu"]') && !e.target.closest('[data-action="show-shortcuts"]')){
    closePop();
  }
});
window.addEventListener('resize', closePop);
$('#viewRoot').addEventListener('scroll', ()=>{ if($('#popRoot').classList.contains('open')) closePop(); });

// —— Atajos de teclado globales ——
document.addEventListener('keydown', e=>{
  const typing = /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName) || e.target.isContentEditable;
  const modalOpen = !!state.modal;

  // Esc: cierra modal o popover
  if(e.key==='Escape'){
    if($('#popRoot').classList.contains('open')){ closePop(); return; }
    if(modalOpen){ closeModal(); return; }
    if($('#sidebar').classList.contains('open')){ closeDrawer(); return; }
    return;
  }

  // Guardar con Ctrl/Cmd+Enter (dentro del modal)
  if(modalOpen && (e.metaKey||e.ctrlKey) && e.key==='Enter'){ e.preventDefault(); saveModal(); return; }

  // Prioridad 1-5 dentro del modal (solo si no se está escribiendo en un campo de texto)
  if(modalOpen && !typing && /^[1-5]$/.test(e.key)){ e.preventDefault(); setDraftPrio(parseInt(e.key,10)); return; }

  if(modalOpen || typing) return; // el resto de atajos no aplican mientras se escribe o hay modal

  switch(e.key.toLowerCase()){
    case 'n': e.preventDefault(); openNewTask(); break;
    case '/': e.preventDefault(); $('#searchInput').focus(); break;
    case 't': setNav('today'); break;
    case 'i': setNav('inbox'); break;
    case 'c': state.view='calendar'; renderView(); renderHeader(); break;
    case 'l': state.view='list'; renderView(); renderHeader(); break;
    case 'b': state.view='board'; renderView(); renderHeader(); break;
  }
});

// —— Drag & Drop en el panel Kanban ——
let dragId=null;
document.addEventListener('dragstart', e=>{
  const card=e.target.closest('.card'); if(!card) return;
  dragId=card.dataset.id; card.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  try{ e.dataTransfer.setData('text/plain', dragId); }catch(_){}
});
document.addEventListener('dragend', e=>{
  const card=e.target.closest('.card'); if(card) card.classList.remove('dragging');
  $$('.column').forEach(c=>c.classList.remove('drag-over'));
  dragId=null;
});
document.addEventListener('dragover', e=>{
  const col=e.target.closest('.column'); if(!col) return;
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  $$('.column').forEach(c=>c.classList.toggle('drag-over', c===col));
});
document.addEventListener('drop', e=>{
  const colEl=e.target.closest('.column'); if(!colEl||!dragId) return;
  e.preventDefault();
  const col=DAY_COLUMNS.find(c=>c.id===colEl.dataset.col);
  const dropped=dragId; dragId=null;
  if(!col) return;
  if(!col.drop){ toast('“Vencidas” no admite reprogramar aquí'); return; }
  setTaskDate(dropped, col.drop());
});

/* Helpers de modal invocados desde eventos */
function toggleAttr(attr, e){
  if(e && e.target.closest('[data-action="attr-clear"]')) return; // el clear se gestiona aparte
  state.modal.activeAttr = state.modal.activeAttr===attr ? null : attr;
  renderDynamic();
}
function clearAttr(attr){
  const d=state.modal.draft;
  if(attr==='date'){ d.date=null; d.time=null; }
  else if(attr==='priority') d.priority=5;
  else if(attr==='labels') d.labels=[];
  else if(attr==='repeat') d.recurrence='none';
  else if(attr==='reminder') d.reminders=[];
  else if(attr==='location') d.location='';
  else if(attr==='deadline') d.deadline=null;
  else if(attr==='attachment') d.attachment=null;
  renderDynamic();
}
function setDraftDate(iso){ state.modal.draft.date=iso||null; if(!iso) state.modal.draft.time=null; renderDynamic(); }
function setDraftPrio(p){ if(!state.modal) return; state.modal.draft.priority=p; renderDynamic(); }
function addLabel(l){
  l=String(l).trim().replace(/^#/,'').toLowerCase(); if(!l) return;
  const d=state.modal.draft;
  if(!d.labels.includes(l)) d.labels.push(l);
  renderDynamic(); const li=$('#labelInput'); if(li){ li.value=''; li.focus(); }
}
function delLabel(l){ const d=state.modal.draft; d.labels=d.labels.filter(x=>x!==l); renderDynamic(); }
function addReminder(){
  const type=$('#remType').value; const d=state.modal.draft;
  if(type==='before'){
    const h=Math.max(1,parseInt(($('#remHours')||{}).value,10)||2);
    d.reminders.push({type:'before', hours:h});
  }else{
    const at=($('#remAt')||{}).value;
    if(!at){ toast('Elige fecha y hora'); return; }
    d.reminders.push({type:'datetime', at:at});
  }
  renderDynamic(); toast('Recordatorio agregado');
}
function delReminder(i){ state.modal.draft.reminders.splice(i,1); renderDynamic(); }

/* Navegación / drawer */
function setNav(nav){ state.nav=nav; state.search=''; $('#searchInput').value=''; closePop(); render(); }
function openDrawer(){ $('#sidebar').classList.add('open'); $('#overlay').classList.add('show'); }
function closeDrawer(){ $('#sidebar').classList.remove('open'); $('#overlay').classList.remove('show'); }

/* Calendario · avanza/retrocede según la unidad de la vista activa */
function calNav(dir){
  const r=fromISO(state.calRef), v=state.calView;
  if(v==='month') state.calRef=toISO(addMonths(r,dir));
  else if(v==='week') state.calRef=toISO(addDays(r,7*dir));
  else state.calRef=toISO(addDays(r,dir));
  renderView();
}

/* Tema claro / oscuro */
function applyTheme(t){
  state.theme = (t==='dark') ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', state.theme);
  updateThemeToggle();
  try{ localStorage.setItem(THEME_KEY, state.theme); }catch(e){}
}
function toggleTheme(){ applyTheme(state.theme==='dark' ? 'light' : 'dark'); }
function updateThemeToggle(){
  const btn=$('#themeToggle'); if(!btn) return;
  const dark = state.theme==='dark';
  const moon='<svg class="ic ic--sm" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
  btn.innerHTML = (dark ? icon('sun','ic--sm') : moon) + '<span>'+(dark ? 'Tema claro' : 'Tema oscuro')+'</span>';
}

function resetDemo(){
  if(!confirm('¿Restablecer las tareas de demostración? Se perderán tus cambios.')) return;
  state.tasks=seedTasks().map(normalizeTask);
  save(); render(); toast('Datos restablecidos');
}

/* ------------------------------------------------------------------ */
/* J. INIT                                                            */
/* ------------------------------------------------------------------ */
function init(){
  // Tema: preferencia guardada o, en su defecto, la del sistema
  let t=null;
  try{ t=localStorage.getItem(THEME_KEY); }catch(e){}
  if(!t) t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  applyTheme(t);

  const stored=load();
  state.tasks = (stored && stored.length ? stored : seedTasks()).map(normalizeTask);
  render();
}
init();
</script>
</body>
